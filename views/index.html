<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şikayet Sistemi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  
</head>

<body class="bg-gray-100">
    <div class="container mx-auto mt-5">
        <h2 class="text-center text-3xl font-bold text-gray-800">Şikayet Sistemi</h2>

        <div class="d-flex justify-content-between mt-4">
            <button id="openAdminPanel" class="btn btn-warning text-white rounded px-4 py-2"><i class="fas fa-user-shield"></i> Admin Paneli</button>
            <button id="openComplaintModal" class="btn btn-primary text-white rounded px-4 py-2"><i class="fas fa-plus"></i> Şikayet Ekle</button>
            <button id="openFilterModal" class="btn btn-secondary text-white rounded px-4 py-2"><i class="fas fa-filter"></i> Filtrele</button>
        </div>

        <div id="summaryContainer" class="mb-3 mt-4">
            <div class="card">
                <div class="card-body bg-white p-4 rounded shadow">
                    <h5 class="card-title text-xl font-semibold text-gray-800"><i class="fas fa-chart-pie"></i> Şikayet Özeti</h5>
                    <p id="summaryÜrün" class="mt-2 text-gray-700">Ürün: 0 şikayet, 0 çözüldü</p>
                    <p id="summaryHizmet" class="text-gray-700">Hizmet: 0 şikayet, 0 çözüldü</p>
                    <p id="summaryDiğer" class="text-gray-700">Diğer: 0 şikayet, 0 çözüldü</p>
                </div>
            </div>
        </div>
        <ul id="complaintList" class="list-group mt-3 space-y-4"></ul>
    </div>

    <!-- Şikayet Ekleme Modalı -->
    <div id="complaintModal" class="modal fade" tabindex="-1" aria-labelledby="complaintModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bootstrap-modal">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="complaintModalLabel"><i class="fas fa-plus"></i> Yeni Şikayet</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="complaintTitle" class="form-control mb-3" placeholder="Şikayet Başlığı">
                    <textarea id="complaintDescription" class="form-control mb-3" rows="3" placeholder="Şikayet Açıklaması"></textarea>
                    <input type="file" id="complaintImage" class="form-control mb-3">
                    <select id="complaintCategory" class="form-select mb-3">
                        <option value="Ürün">Ürün</option>
                        <option value="Hizmet">Hizmet</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                    <div class="preview-container mt-3" id="complaintPreview" style="display: none;">
                        <h5 class="text-lg font-semibold">Önizleme</h5>
                        <p id="previewTitle" class="mt-2"></p>
                        <p id="previewDescription"></p>
                        <img id="previewImage" src="" alt="Şikayet Görseli" class="img-fluid rounded mt-2" style="display: none;">
                        <p id="previewCategory"></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                    <button type="button" class="btn btn-info" id="previewComplaint">Önizleme</button>
                    <button type="button" class="btn btn-primary" id="addComplaint">Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Filtreleme Modalı -->
    <div id="filterModal" class="modal fade" tabindex="-1" aria-labelledby="filterModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bootstrap-modal">
                <div class="modal-header bg-secondary text-white">
                    <h5 class="modal-title" id="filterModalLabel"><i class="fas fa-filter"></i> Şikayetleri Filtrele</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Şikayet Ara...">
                    <select id="categoryFilter" class="form-select mb-3">
                        <option value="">Kategori Seç</option>
                        <option value="Ürün">Ürün</option>
                        <option value="Hizmet">Hizmet</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                    <select id="statusFilter" class="form-select mb-3">
                        <option value="">Durum Seç</option>
                        <option value="Açık">Açık</option>
                        <option value="Beklemede">Beklemede</option>
                        <option value="Çözüldü">Çözüldü</option>
                    </select>
                    <select id="sortFilter" class="form-select mb-3">
                        <option value="newest">En Yeniler</option>
                        <option value="oldest">En Eskiler</option>
                        <option value="alphabetical">Alfabetik</option>
                        <option value="rating">Puan</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                    <button type="button" class="btn btn-primary" id="applyFilters">Filtrele</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminPanelModal" class="modal fade" tabindex="-1" aria-labelledby="adminPanelModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bootstrap-modal">
                <div class="modal-header bg-warning text-white">
                    <h5 class="modal-title" id="adminPanelModalLabel"><i class="fas fa-user-shield"></i> Admin Paneli</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Başlık</th>
                                <th>Kategori</th>
                                <th>Durum</th>
                                <th>Şikayet Tarihi</th>
                                <th>Güncelle</th>
                                <th>Yorum Ekle</th>
                            </tr>
                        </thead>
                        <tbody id="adminComplaintTable"></tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="position-fixed bottom-0 start-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast align-items-center text-white bg-success border-0 bootstrap-toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    İşlem başarılı!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script.js"></script>

</body>
</html>
